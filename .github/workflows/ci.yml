name: CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install || true

      - name: Run tests
        run: npm test || true

      - name: Build Docker Image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t leave-system .
          fi
